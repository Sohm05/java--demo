name: Deploy Java App to AKS

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: java-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Setup Java
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Build JAR
    - name: Build application
      run: mvn clean package -DskipTests

    # 4. Azure Login (NEW METHOD)
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 5. Login to ACR
    - name: Login to ACR
      run: az acr login --name ${{ secrets.ACR_NAME }}

    # 6. Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .

    # 7. Push Docker Image
    - name: Push Docker Image
      run: |
        docker push ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

    # 8. Get AKS Credentials
    - name: Get AKS Credentials
      run: |
        az aks get-credentials \
          --resource-group ${{ secrets.RESOURCE_GROUP }} \
          --name ${{ secrets.AKS_CLUSTER_NAME }}

    # 9. Deploy to AKS
    - name: Deploy to AKS
      run: |
        kubectl apply -f k8s/
        kubectl set image deployment/java-app \
        java-app=${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}