name: Deploy to AKS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build app
      run: mvn clean package -DskipTests

    - name: Azure login
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Login to ACR
      run: az acr login --name ${{ secrets.ACR_NAME }}

    - name: Build Docker image
      run: docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/java-app:${{ github.sha }} .

    - name: Push image
      run: docker push ${{ secrets.ACR_NAME }}.azurecr.io/java-app:${{ github.sha }}

    - name: Get AKS credentials
      run: az aks get-credentials --resource-group ${{ secrets.RESOURCE_GROUP }} --name ${{ secrets.AKS_CLUSTER_NAME }}

    - name: Deploy to AKS
      run: |
        kubectl apply -f k8s/
        kubectl set image deployment/java-app java-app=${{ secrets.ACR_NAME }}.azurecr.io/java-app:${{ github.sha }}